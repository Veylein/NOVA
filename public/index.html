<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA | Neural Omniscient Virtual Assistant</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="particles.js"></script>
</head>
<body>

    <!-- Background Animation -->
    <div id="canvas-bg"></div>

    <div class="main-container">
        <!-- Lean Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <i class="fas fa-atom brand-icon"></i>
                <span>NOVA</span>
            </div>

            <div class="stats-grid">
                <div class="stats-card">
                    <div class="stats-title">Knowledge Base</div>
                    <div class="stats-value">
                        <i class="fas fa-database" style="font-size: 0.8em; color: var(--primary-color);"></i>
                        <span id="fact-count">...</span>
                    </div>
                </div>
                <div class="stats-card">
                    <div class="stats-title">System Status</div>
                    <div class="stats-value">
                        <i class="fas fa-check-circle" style="font-size: 0.8em; color: #00ff88;"></i>
                        <span>Online</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="voiceToggleBtn" class="icon-button-toggle active" title="Toggle Voice Output">
                    <i class="fas fa-volume-up"></i> Voice Output
                </button>
                <button id="micToggleBtn" class="icon-button-toggle" title="Toggle Mic Input">
                    <i class="fas fa-microphone"></i> Mic Input
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="chat-title">Interface // Session_01</div>
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    Connected
                </div>
            </header>

            <div class="messages-container" id="messages">
                <div class="message bot">
                    Hello user. I am <strong>NOVA</strong>. 
                    <br>I am ready to learn and assist. How can I help you today?
                </div>
                <div class="typing" id="typingIndicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>

            <footer class="input-area">
                <button class="action-btn" id="attachBtn" title="Upload Knowledge (Disabled in demo)">
                    <i class="fas fa-paperclip"></i>
                </button>
                
                <div class="input-wrapper">
                    <textarea id="userInput" placeholder="Type a message or paste Q: / A: pairs to bulk learn..." rows="1"></textarea>
                    <button class="action-btn" id="micBtn">
                        <i class="fas fa-microphone"></i>
                    </button>
                </div>

                <button id="sendBtn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </footer>
        </main>
    </div>

    <script>
        /* --- UI & Particles Setup --- */
        document.addEventListener('DOMContentLoaded', () => {
            particlesJS.load('canvas-bg', 'particles.json', function() {
                console.log('particles.js loaded');
            });

            // Initialize Stats
            updateStats();
            
            // Auto-resize Textarea
            const textarea = document.getElementById('userInput');
            textarea.addEventListener('input', function() {
                this.style.height = 'auto'; // Reset height
                this.style.height = (this.scrollHeight) + 'px'; // Set to scroll height
                if(this.value === '') this.style.height = 'auto';
            });
        });

        /* --- Core Logic --- */
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const voiceToggleBtn = document.getElementById('voiceToggleBtn');
        const factCountSpan = document.getElementById('fact-count');

        let isVoiceEnabled = true;
        
        // Voice Output Toggle
        voiceToggleBtn.addEventListener('click', () => {
            isVoiceEnabled = !isVoiceEnabled;
            voiceToggleBtn.classList.toggle('active');
            voiceToggleBtn.innerHTML = isVoiceEnabled ? 
                '<i class="fas fa-volume-up"></i> Voice Output' : 
                '<i class="fas fa-volume-mute"></i> Voice Muted';
        });

        /* --- Stats Handling --- */
        async function updateStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                factCountSpan.innerText = (data.totalFacts || 0).toLocaleString();
            } catch (e) {
                console.error("Failed to fetch stats", e);
                factCountSpan.innerText = "Error";
            }
        }

        /* --- Messaging Logic --- */
        function appendMessage(text, sender, isHtml = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            if (isHtml) {
                msgDiv.innerHTML = text;
            } else {
                msgDiv.textContent = text;
            }
            
            // Insert before typing indicator
            messagesDiv.insertBefore(msgDiv, typingIndicator);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTyping(show) {
            typingIndicator.style.display = show ? 'flex' : 'none';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Clear input & Reset height
            userInput.value = '';
            userInput.style.height = 'auto'; 
            appendMessage(text, 'user');
            
            showTyping(true);

            // Check for Bulk Learning (Q: ... A: ...)
            if (text.includes('Q:') && text.includes('A:')) {
                await handleBulkLearning(text);
                return;
            }

            // Normal Chat
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                
                showTyping(false);
                
                // Format markdown if needed (using marked.js)
                const formattedResponse = marked.parse(data.reply);
                appendMessage(formattedResponse, 'bot', true);

                if (isVoiceEnabled) speak(data.reply);
                updateStats(); // Refresh stats after potential interaction
            } catch (err) {
                showTyping(false);
                appendMessage("Error communicating with NOVA core.", 'bot');
                console.error(err);
            }
        }

        async function handleBulkLearning(text) {
            const lines = text.split('\n').filter(line => line.trim() !== '');
            const items = [];
            let currentQ = null;

            lines.forEach(line => {
                if (line.trim().startsWith('Q:')) {
                    currentQ = line.trim().substring(2).trim();
                } else if (line.trim().startsWith('A:') && currentQ) {
                    const currentA = line.trim().substring(2).trim();
                    items.push({ questions: [currentQ], answer: currentA });
                    currentQ = null;
                }
            });

            if (items.length > 0) {
                try {
                    const res = await fetch('/api/learn-batch', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ items })
                    });
                    const result = await res.json();
                    showTyping(false);
                    appendMessage(`Processed ${items.length} new memory items. ${result.message}`, 'bot');
                    if (isVoiceEnabled) speak(`I have processed ${items.length} new items.`);
                    updateStats();
                } catch (e) {
                    showTyping(false);
                    appendMessage("Error processing bulk learning.", 'bot');
                }
            } else {
                showTyping(false);
                appendMessage("I couldn't parse the Q/A format. Please ensure you use 'Q: Question' and 'A: Answer' on separate lines.", 'bot');
            }
        }

        // Event Listeners
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        /* --- Speech Synthesis --- */
        function speak(text) {
            if (!window.speechSynthesis) return;
            // Clean markdown/html for speech
            const cleanText = text.replace(/<[^>]*>?/gm, ''); 
            const utterance = new SpeechSynthesisUtterance(cleanText);
            // Try to find a good voice
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.name.includes('Google US English')) || voices.find(v => v.name.includes('Samantha'));
            if (preferredVoice) utterance.voice = preferredVoice;
            utterance.rate = 1;
            utterance.pitch = 1;
            window.speechSynthesis.speak(utterance);
        }

        /* --- Speech Recognition (STT) --- */
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false; // Stop after one sentence
            recognition.lang = 'en-US';

            micBtn.addEventListener('click', () => {
                recognition.start();
                micBtn.classList.add('recording');
            });

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                userInput.value = transcript;
                micBtn.classList.remove('recording');
                sendMessage(); // Auto-send on voice end
            };

            recognition.onerror = () => {
                micBtn.classList.remove('recording');
            };

            recognition.onend = () => {
                micBtn.classList.remove('recording');
            };
        } else {
            micBtn.style.display = 'none'; // Hide if not supported
            console.log("Web Speech API not supported");
        }

    </script>
</body>
</html>
