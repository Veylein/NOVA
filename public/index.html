<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA - Virtual Assistant</title>
    <!-- Use style.css with cache busting query param -->
    <link rel="stylesheet" href="style.css?v=2">
    <!-- Font Awesome (CDN) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Inline fallback styles in case external CSS fails -->
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center;
            font-size: 20px; transition: opacity 0.5s;
        }
    </style>
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Particles (Optional) -->
    <!-- <script src="particles.js"></script> Commented out to isolate issues -->
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading" class="loading-overlay">Initializing NOVA Core...</div>

    <!-- Background Canvas -->
    <div id="canvas-bg"></div>

    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <i class="fas fa-atom brand-icon"></i>
                <span>NOVA</span>
            </div>

            <!-- Dashboard Stats -->
            <div class="stats-grid">
                <div class="stats-card">
                    <div class="stats-title">Memory Units</div>
                    <div class="stats-value" id="fact-count">Loading...</div>
                </div>
                <div class="stats-card">
                    <div class="stats-title">Status</div>
                    <div class="stats-value" style="color: #00ff88;">
                        <i class="fas fa-check-circle"></i> Online
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="sidebar-footer">
                <div class="icon-button-toggle active" id="voiceToggleBtn">
                    <i class="fas fa-volume-up"></i> Voice Active
                </div>
            </div>
        </aside>

        <!-- Chat Interface -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="chat-title">Session: Active</div>
            </header>

            <div class="messages-container" id="messages">
                <div class="message bot">
                    <strong>NOVA:</strong> System initialized. I am listening.
                </div>
            </div>

            <footer class="input-area">
                <textarea id="userInput" placeholder="Type a message..." rows="1"></textarea>
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </footer>
        </main>
    </div>

    <script>
        // Remove loading screen when loaded
        window.addEventListener('load', () => {
            const loader = document.getElementById('loading');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
            updateStats();
        });

        // Stats Logic
        const factCountSpan = document.getElementById('fact-count');
        async function updateStats() {
            try {
                const res = await fetch('/api/stats');
                if(res.ok) {
                    const data = await res.json();
                    factCountSpan.innerText = (data.totalFacts || 0).toLocaleString();
                } else {
                    factCountSpan.innerText = "Offline";
                }
            } catch (e) {
                console.error("Stats error", e);
                factCountSpan.innerText = "Error";
            }
        }

        // Chat Logic
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesDiv = document.getElementById('messages');
        let isVoiceEnabled = true;

        document.getElementById('voiceToggleBtn').addEventListener('click', function() {
            isVoiceEnabled = !isVoiceEnabled;
            this.classList.toggle('active');
            this.innerHTML = isVoiceEnabled ? 
                '<i class="fas fa-volume-up"></i> Voice Active' : 
                '<i class="fas fa-volume-mute"></i> Voice Muted';
        });

        function appendMessage(text, sender, isHtml = false) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            if(isHtml) div.innerHTML = text;
            else div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            appendMessage(text, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';

            try {
                // Bulk Learning Check
                if (text.includes('Q:') && text.includes('A:')) {
                     // Simple heuristic for bulk
                     const lines = text.split('\n');
                     // Convert to items... (simplified for now)
                     const items = [];
                     let q = null;
                     lines.forEach(l => {
                         if(l.trim().startsWith('Q:')) q = l.replace('Q:','').trim();
                         else if(l.trim().startsWith('A:') && q) {
                             items.push({ questions:[q], answer: l.replace('A:','').trim() });
                             q = null;
                         }
                     });
                     
                     if(items.length > 0) {
                         const res = await fetch('/api/learn-batch', {
                             method: 'POST', 
                             headers: {'Content-Type': 'application/json'},
                             body: JSON.stringify({ items })
                         });
                         const data = await res.json();
                         appendMessage(data.message, 'bot');
                         if(isVoiceEnabled) speak(data.message);
                         updateStats();
                         return;
                     }
                }

                // Normal Chat
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                
                // Parse markdown
                const html = marked.parse(data.reply);
                appendMessage(html, 'bot', true);
                
                if(isVoiceEnabled) speak(data.reply);

            } catch (err) {
                console.error(err);
                appendMessage("Connection error.", 'bot');
            }
        }

        userInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
            // Auto resize
            setTimeout(() => {
                userInput.style.height = 'auto';
                userInput.style.height = userInput.scrollHeight + 'px';
            }, 0);
        });

        sendBtn.addEventListener('click', sendMessage);

        function speak(text) {
            if (!window.speechSynthesis) return;
            const u = new SpeechSynthesisUtterance(text.replace(/<[^>]+>/g, ''));
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
